<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotardoBot - Iniciar Sesión</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="space-background"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1><i class="fas fa-robot"></i> BotardoBot</h1>
                <p>Asistente Educativo Inteligente</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" required placeholder="tu@ejemplo.com">
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" id="loginBtn" class="login-btn">
                    <span class="btn-text">Iniciar Sesión</span>
                    <div class="btn-loader hidden">
                        <div class="loader"></div>
                    </div>
                </button>
            </form>
            
            <div class="divider">
                <span>o</span>
            </div>
            
            <button class="google-login-btn" id="googleLoginBtn">
                <i class="fab fa-google"></i>
                <span class="btn-text">Continuar con Google</span>
                <div class="btn-loader hidden">
                    <div class="loader"></div>
                </div>
            </button>
            
            <div class="login-footer">
                <p>¿No tienes cuenta? <a href="#" id="registerLink">Regístrate aquí</a></p>
                <p class="credits">Desarrollado por: Juan Diego Henao, Juan Felipe Lopez y Juan Jose Lasso</p>
            </div>
        </div>

        <div class="register-card hidden" id="registerCard">
            <div class="login-header">
                <h1><i class="fas fa-user-plus"></i> Crear Cuenta</h1>
                <p>Únete a BotardoBot</p>
            </div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="registerName">Nombre completo</label>
                    <input type="text" id="registerName" required placeholder="Tu nombre completo">
                </div>
                
                <div class="input-group">
                    <label for="registerEmail">Correo electrónico</label>
                    <input type="email" id="registerEmail" required placeholder="tu@ejemplo.com">
                </div>
                
                <div class="input-group">
                    <label for="registerPassword">Contraseña</label>
                    <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres">
                </div>
                
                <div class="input-group">
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" required placeholder="Repite tu contraseña">
                </div>
                
                <button type="submit" id="registerBtn" class="login-btn">
                    <span class="btn-text">Crear Cuenta</span>
                    <div class="btn-loader hidden">
                        <div class="loader"></div>
                    </div>
                </button>
            </form>
            
            <div class="login-footer">
                <p>¿Ya tienes cuenta? <a href="#" id="loginLink">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script src="login.js"></script>
</body>
</html>
